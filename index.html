<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉FC HOME CENTER MALOLOS Mini-click Game!</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">

<style>
  body { 
    margin: 0; 
    padding: 0; 
    height: 100vh; 
    font-family: 'Roboto', Arial, sans-serif; 
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical centering */
    align-items: center;     /* horizontal centering */
    background: url('fchomelogo.jpg') no-repeat center center;
    background-size: cover;
    position: relative;
    text-align: center;
  }

  /* Overlay to make background faint */
  body::before {
    content:"";
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background-color: rgba(255,255,255,0.7);
    z-index:0;
  }

  h2 {
    font-family: 'Luckiest Guy', cursive;
    font-size: 2em;
    color: #1e90ff;
    position: relative; 
    z-index: 1;
    margin: 0;
  }

  p {
    font-family: 'Roboto', sans-serif;
    font-size: 1.1em;
    color: #333;
    margin: 5px 0 20px 0;
    position: relative; 
    z-index: 1;
  }

  #game-board {
    display:grid;
    grid-template-columns:repeat(3, 80px);
    grid-gap: 20px; /* more space between cells */
    justify-content:center;
    margin-top:20px;
    position: relative; 
    z-index:1;
  }

  .cell { 
    width:80px; 
    height:80px; 
    background:#00bfff; 
    color:white; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size:14px; 
    border-radius:8px; 
    cursor:pointer; 
    user-select:none; 
    text-align:center; 
    padding:5px; 
    transition: transform 0.2s, background 0.2s;
  }

  .cell:hover {
    transform: scale(1.05); 
  }

  .cell.revealed { 
    background:#87cefa; 
    cursor:default; 
  }

  #message { 
    margin-top:20px; 
    font-size:16px; 
    font-weight:bold; 
    font-family: 'Poppins', sans-serif;
    color: #1e90ff;
    position: relative; 
    z-index:1;
  }

  /* Bottom-right note */
  #note {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-family: 'Poppins', sans-serif;
    font-size:12px;
    color:#333;
    background: rgba(255,255,255,0.85);
    padding: 6px 10px;
    border-radius: 5px;
    z-index: 2;
    font-style: italic;
    box-shadow: 1px 1px 5px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<h2>🎉FC HOME CENTER MALOLOS Mini-click Game!</h2>
<p>Click a cell to reveal your prize. Only one try per play!</p>

<div id="game-board"></div>
<p id="message"></p>

<div id="note">✨ Promotions and discounts may vary. Terms apply. ✨</div>

<script>
// 3x3 grid
const totalCells = 9;
const gameBoard = document.getElementById("game-board");
const message = document.getElementById("message");

// Prizes + bomb setup
const prizes = [
  "You got 500 PHP discount (Tonik financing)!",
  "You got 500 PHP discount (Tonik financing)!",
  "You got free soundbar when you purchase (Samwon 65\" TV)!",
  "You got 1000 PHP discount (twin-tub washing machine)!",
  "You got 20% discount (Furniture)!",
  "You got 20% discount (Furniture)!",
  "You got 50% discount (Small Appliances)!",
  "You got 50% discount (Small Appliances)!",
  "Try again next time!" // bomb
];

let cellValues = Array(totalCells).fill("empty");

// Randomly assign prizes
prizes.forEach(prize => {
  let idx;
  do { idx = Math.floor(Math.random() * totalCells); } 
  while (cellValues[idx] !== "empty");
  cellValues[idx] = prize;
});

// Create cells
for (let i = 0; i < totalCells; i++) {
  const cell = document.createElement("div");
  cell.classList.add("cell");
  cell.dataset.index = i;
  gameBoard.appendChild(cell);

  cell.addEventListener("click", () => {
    if (cell.classList.contains("revealed")) return;

    cell.classList.add("revealed");
    const prize = cellValues[i];
    cell.textContent = prize.includes("discount") || prize.includes("free") ? "🎁" : "💣";
    message.textContent = prize;

    // Disable all other cells
    document.querySelectorAll('.cell').forEach(c => {
      if (!c.classList.contains("revealed")) {
        c.classList.add("revealed");
        c.style.cursor = "default";
      }
    });
  });
}
</script>

</body>
</html>
